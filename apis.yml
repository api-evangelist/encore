aid: encore
name: Encore
description: >-
  Encore is an open source development platform for building type-safe,
  production-ready backend applications and distributed systems. It supports
  Go and TypeScript, provides built-in infrastructure automation for databases,
  caches, pub/sub, and cron jobs, and includes a local development dashboard
  with automatic API documentation and distributed tracing.
